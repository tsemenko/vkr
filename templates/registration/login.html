<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход | Веб-сервис AD</title>
  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f4f6f9; color:#111827; }
    .wrap { display:flex; min-height:100vh; align-items:center; justify-content:center; padding:24px; }
    .card { width:360px; background:#fff; border:1px solid #e5e7eb; border-radius:14px; padding:22px 22px 18px; box-shadow:0 10px 20px rgba(0,0,0,.06); }
    h1 { margin:0 0 6px; font-size:20px; }
    p { margin:0 0 14px; color:#6b7280; font-size:13px; }
    button { width:100%; padding:10px 12px; border-radius:10px; border:0; background:#2563eb; color:#fff; font-weight:600; cursor:pointer; }
    input { width:100%; padding:10px; border-radius:10px; border:1px solid #e5e7eb; }
    label { font-size:13px; color:#6b7280; }
    ul.errorlist { list-style:none; padding:0; margin:0 0 10px; color:#b91c1c; }
    a { color:#2563eb; text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Веб-сервис AD</h1>
      <p>Вход для администраторов и операторов</p>

      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Войти</button>
      </form>

      <p style="margin-top:12px;">
        <a href="/admin/">Админка Django</a>
      </p>
    </div>
  </div>
</body>
</html>
